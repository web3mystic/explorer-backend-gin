<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blockchain API Tester</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b0f;
    --surface: #0d1117;
    --card: #111820;
    --border: #1e2d3d;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #00ff88;
    --red: #ff4060;
    --yellow: #ffd060;
    --text: #c9d1d9;
    --muted: #4a5568;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,11,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .base-url-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    flex: 1;
    max-width: 420px;
    margin: 0 20px;
  }

  .base-url-bar label {
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
  }

  .base-url-bar input {
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    flex: 1;
    min-width: 0;
  }

  .status-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid;
    font-weight: 500;
  }

  .status-badge.ok { color: var(--green); border-color: var(--green); background: rgba(0,255,136,0.06); }
  .status-badge.err { color: var(--red); border-color: var(--red); background: rgba(255,64,96,0.06); }
  .status-badge.idle { color: var(--muted); border-color: var(--muted); }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 57px);
    position: relative;
    z-index: 1;
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--surface);
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-group {
    padding: 6px 0;
  }

  .sidebar-group-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 10px 16px 4px;
    text-transform: uppercase;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    color: var(--text);
    font-size: 12px;
  }

  .sidebar-item:hover {
    background: rgba(0,212,255,0.04);
    color: var(--accent);
    border-left-color: var(--border);
  }

  .sidebar-item.active {
    background: rgba(0,212,255,0.08);
    color: var(--accent);
    border-left-color: var(--accent);
  }

  .method-tag {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(0,212,255,0.12);
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.2);
    min-width: 30px;
    text-align: center;
  }

  .item-path {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Main panel */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Request panel */
  .request-panel {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
  }

  .endpoint-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .endpoint-desc {
    color: var(--muted);
    font-size: 11px;
    margin-bottom: 16px;
  }

  .url-builder {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .full-url {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .full-url:focus { border-color: var(--accent); }

  .send-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 9px 22px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .send-btn:hover { background: #33ddff; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,212,255,0.3); }
  .send-btn:active { transform: translateY(0); }
  .send-btn.loading { opacity: 0.7; pointer-events: none; }

  /* Params */
  .params-section {
    margin-top: 14px;
  }

  .params-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .params-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .param-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .param-input-wrap label {
    font-size: 10px;
    color: var(--muted);
  }

  .param-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    width: 160px;
    transition: border-color 0.2s;
  }

  .param-input:focus { border-color: var(--accent); }

  /* Response area */
  .response-area {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .response-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .response-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .res-status {
    font-size: 12px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .res-status.s2xx { background: rgba(0,255,136,0.15); color: var(--green); }
  .res-status.s4xx { background: rgba(255,208,96,0.15); color: var(--yellow); }
  .res-status.s5xx { background: rgba(255,64,96,0.15); color: var(--red); }

  .res-time { color: var(--muted); font-size: 11px; }
  .res-size { color: var(--muted); font-size: 11px; }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 11px;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .response-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    background: var(--bg);
  }

  .response-body::-webkit-scrollbar { width: 6px; }
  .response-body::-webkit-scrollbar-track { background: transparent; }
  .response-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .json-tree { line-height: 1.7; }

  .json-key { color: #79c0ff; }
  .json-string { color: #a5d6ff; }
  .json-number { color: #ffa657; }
  .json-bool { color: var(--accent2); font-weight: 700; }
  .json-null { color: var(--muted); font-style: italic; }
  .json-bracket { color: var(--muted); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    gap: 12px;
    text-align: center;
  }

  .empty-state .icon {
    font-size: 40px;
    opacity: 0.3;
  }

  .empty-state p { font-size: 12px; }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--card);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 12px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* Error banner */
  .error-banner {
    background: rgba(255,64,96,0.08);
    border: 1px solid rgba(255,64,96,0.3);
    color: var(--red);
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 12px;
    margin: 16px;
  }

  /* History */
  .history-bar {
    display: flex;
    gap: 6px;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    background: var(--surface);
    flex-shrink: 0;
  }

  .history-bar::-webkit-scrollbar { height: 3px; }
  .history-bar::-webkit-scrollbar-thumb { background: var(--border); }

  .history-chip {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .history-chip:hover { border-color: var(--accent); color: var(--accent); }
  .history-chip .chip-status { width: 5px; height: 5px; border-radius: 50%; }
  .history-chip .chip-status.ok { background: var(--green); }
  .history-chip .chip-status.err { background: var(--red); }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    CHAIN<span style="color:var(--accent)">TESTER</span>
  </div>
  <div class="base-url-bar">
    <label>BASE URL</label>
    <input type="text" id="baseUrl" value="http://localhost:8080/api/v1" placeholder="http://localhost:8080/api/v1">
  </div>
  <span class="status-badge idle" id="globalStatus">IDLE</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main -->
  <div class="main">
    <div class="request-panel" id="requestPanel">
      <div class="empty-state" style="padding:20px 0">
        <div class="icon">⬅</div>
        <p>Select an endpoint from the sidebar</p>
      </div>
    </div>

    <div class="history-bar" id="historyBar" style="display:none"></div>

    <div class="response-area">
      <div id="responseContainer" style="flex:1;display:flex;flex-direction:column">
        <div class="empty-state" style="flex:1">
          <div class="icon">⚡</div>
          <p>Hit <strong style="color:var(--accent)">SEND</strong> to fire the request</p>
          <p style="margin-top:4px;font-size:11px;">Response will appear here</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
// ─── Endpoint Definitions ─────────────────────────────────────────────────────
const ENDPOINTS = [
  {
    group: 'Health & Stats',
    items: [
      { name: 'Health Check', path: '/health', desc: 'API health check' },
      { name: 'Chain Stats', path: '/stats', desc: 'Chain-wide aggregates' },
      { name: 'Search', path: '/search', desc: 'Global search', params: [{ key: 'q', label: 'Query (hash/address/height)', default: '' }] },
    ]
  },
  {
    group: 'Blocks',
    items: [
      { name: 'List Blocks', path: '/blocks', desc: 'Paginated block list', params: [{ key: 'page', label: 'Page', default: '1' }, { key: 'per_page', label: 'Per Page', default: '10' }] },
      { name: 'Latest Block', path: '/blocks/latest', desc: 'Most recent block' },
      { name: 'Block by Height', path: '/blocks/:height', desc: 'Single block', pathParams: [{ key: 'height', label: 'Height', default: '1' }] },
      { name: 'Block Transactions', path: '/blocks/:height/transactions', desc: 'Txs in a block', pathParams: [{ key: 'height', label: 'Height', default: '1' }] },
    ]
  },
  {
    group: 'Transactions',
    items: [
      { name: 'List Transactions', path: '/transactions', desc: 'All txs paginated', params: [{ key: 'page', label: 'Page', default: '1' }, { key: 'per_page', label: 'Per Page', default: '10' }] },
      { name: 'Recent Transactions', path: '/transactions/recent', desc: 'Recent tx view', params: [{ key: 'page', label: 'Page', default: '1' }, { key: 'per_page', label: 'Per Page', default: '10' }] },
      { name: 'Transaction by Hash', path: '/transactions/:hash', desc: 'Single tx', pathParams: [{ key: 'hash', label: 'TX Hash', default: '' }] },
      { name: 'TX Messages', path: '/transactions/:hash/messages', desc: 'Messages in tx', pathParams: [{ key: 'hash', label: 'TX Hash', default: '' }] },
      { name: 'TX Events', path: '/transactions/:hash/events', desc: 'Events in tx', pathParams: [{ key: 'hash', label: 'TX Hash', default: '' }] },
    ]
  },
  {
    group: 'Addresses',
    items: [
      { name: 'Address Balances', path: '/addresses/:address/balances', desc: 'Balances for address', pathParams: [{ key: 'address', label: 'Address', default: '' }] },
      { name: 'Address Transactions', path: '/addresses/:address/transactions', desc: 'Txs for address', pathParams: [{ key: 'address', label: 'Address', default: '' }], params: [{ key: 'page', label: 'Page', default: '1' }] },
      { name: 'Address Bank Transfers', path: '/addresses/:address/bank-transfers', desc: 'Bank transfers', pathParams: [{ key: 'address', label: 'Address', default: '' }] },
      { name: 'Address CW20 Transfers', path: '/addresses/:address/cw20-transfers', desc: 'CW20 transfers', pathParams: [{ key: 'address', label: 'Address', default: '' }] },
      { name: 'Address Votes', path: '/addresses/:address/votes', desc: 'Governance votes', pathParams: [{ key: 'address', label: 'Address', default: '' }] },
      { name: 'All Balances', path: '/balances', desc: 'All balances', params: [{ key: 'denom', label: 'Denom (optional)', default: '' }, { key: 'page', label: 'Page', default: '1' }] },
    ]
  },
  {
    group: 'Bank Transfers',
    items: [
      { name: 'List Transfers', path: '/bank-transfers', desc: 'All bank transfers', params: [{ key: 'page', label: 'Page', default: '1' }, { key: 'per_page', label: 'Per Page', default: '10' }] },
      { name: 'Transfer by ID', path: '/bank-transfers/:id', desc: 'Single transfer', pathParams: [{ key: 'id', label: 'Transfer ID', default: '1' }] },
    ]
  },
  {
    group: 'Validators',
    items: [
      { name: 'List Validators', path: '/validators', desc: 'All validators', params: [{ key: 'status', label: 'Status (optional)', default: '' }, { key: 'page', label: 'Page', default: '1' }] },
      { name: 'Validator by Address', path: '/validators/:address', desc: 'Single validator', pathParams: [{ key: 'address', label: 'Operator Address', default: '' }] },
      { name: 'Validator History', path: '/validators/:address/history', desc: 'History', pathParams: [{ key: 'address', label: 'Operator Address', default: '' }] },
      { name: 'Validator Stats', path: '/validators/:address/stats', desc: 'Stats', pathParams: [{ key: 'address', label: 'Operator Address', default: '' }] },
      { name: 'All Validator Stats', path: '/validator-stats', desc: 'Stats for all', params: [{ key: 'page', label: 'Page', default: '1' }] },
    ]
  },
  {
    group: 'Governance',
    items: [
      { name: 'List Proposals', path: '/proposals', desc: 'All proposals', params: [{ key: 'status', label: 'Status (optional)', default: '' }, { key: 'page', label: 'Page', default: '1' }] },
      { name: 'Proposal by ID', path: '/proposals/:id', desc: 'Single proposal', pathParams: [{ key: 'id', label: 'Proposal ID', default: '1' }] },
      { name: 'Proposal Votes', path: '/proposals/:id/votes', desc: 'Votes on proposal', pathParams: [{ key: 'id', label: 'Proposal ID', default: '1' }] },
    ]
  },
  {
    group: 'Wasm — Codes',
    items: [
      { name: 'List Codes', path: '/wasm/codes', desc: 'All wasm codes', params: [{ key: 'page', label: 'Page', default: '1' }] },
      { name: 'Code by ID', path: '/wasm/codes/:code_id', desc: 'Single code', pathParams: [{ key: 'code_id', label: 'Code ID', default: '1' }] },
      { name: 'Contracts for Code', path: '/wasm/codes/:code_id/contracts', desc: 'Contracts by code', pathParams: [{ key: 'code_id', label: 'Code ID', default: '1' }] },
    ]
  },
  {
    group: 'Wasm — Contracts',
    items: [
      { name: 'List Contracts', path: '/wasm/contracts', desc: 'All contracts', params: [{ key: 'page', label: 'Page', default: '1' }] },
      { name: 'Contract by Address', path: '/wasm/contracts/:address', desc: 'Single contract', pathParams: [{ key: 'address', label: 'Contract Address', default: '' }] },
      { name: 'Contract Executions', path: '/wasm/contracts/:address/executions', desc: 'Executions', pathParams: [{ key: 'address', label: 'Contract Address', default: '' }] },
      { name: 'Contract Events', path: '/wasm/contracts/:address/events', desc: 'Events', pathParams: [{ key: 'address', label: 'Contract Address', default: '' }] },
      { name: 'Contract Migrations', path: '/wasm/contracts/:address/migrations', desc: 'Migrations', pathParams: [{ key: 'address', label: 'Contract Address', default: '' }] },
    ]
  },
  {
    group: 'Wasm — Misc',
    items: [
      { name: 'All Executions', path: '/wasm/executions', desc: 'Paginated executions', params: [{ key: 'page', label: 'Page', default: '1' }] },
      { name: 'All Instantiations', path: '/wasm/instantiations', desc: 'All instantiations', params: [{ key: 'page', label: 'Page', default: '1' }] },
      { name: 'Contract Activity', path: '/wasm/activity', desc: 'Activity leaderboard', params: [{ key: 'page', label: 'Page', default: '1' }] },
      { name: 'Recent Wasm Activity', path: '/wasm/activity/recent', desc: 'Recent activity', params: [{ key: 'page', label: 'Page', default: '1' }] },
    ]
  },
  {
    group: 'CW20',
    items: [
      { name: 'CW20 Transfers', path: '/cw20/transfers', desc: 'All CW20 transfers', params: [{ key: 'contract', label: 'Contract (optional)', default: '' }, { key: 'page', label: 'Page', default: '1' }] },
      { name: 'CW20 Address Activity', path: '/cw20/address-activity', desc: 'Address activity', params: [{ key: 'contract', label: 'Contract (optional)', default: '' }] },
    ]
  },
  {
    group: 'Authority Accounts',
    items: [
      { name: 'List Accounts', path: '/authority-accounts', desc: 'All authority accounts', params: [{ key: 'active', label: 'Active (true/false)', default: '' }] },
      { name: 'Account by Address', path: '/authority-accounts/:address', desc: 'Single account', pathParams: [{ key: 'address', label: 'Address', default: '' }] },
    ]
  },
  {
    group: 'Sync State',
    items: [
      { name: 'Indexer State', path: '/state/indexer', desc: 'Indexer sync state' },
      { name: 'Validator Sync', path: '/state/validator-sync', desc: 'Validator sync' },
      { name: 'Proposal Sync', path: '/state/proposal-sync', desc: 'Proposal sync' },
    ]
  },
];

// ─── State ────────────────────────────────────────────────────────────────────
let currentEndpoint = null;
let history = [];

// ─── Render Sidebar ───────────────────────────────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = ENDPOINTS.map(group => `
    <div class="sidebar-group">
      <div class="sidebar-group-title">${group.group}</div>
      ${group.items.map((item, i) => `
        <div class="sidebar-item" onclick="selectEndpoint('${group.group}', ${i})" id="ep-${group.group.replace(/\s/g,'-')}-${i}">
          <span class="method-tag">GET</span>
          <span class="item-path">${item.name}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ─── Select Endpoint ──────────────────────────────────────────────────────────
function selectEndpoint(groupName, idx) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`ep-${groupName.replace(/\s/g,'-')}-${idx}`)?.classList.add('active');

  const group = ENDPOINTS.find(g => g.group === groupName);
  currentEndpoint = group.items[idx];
  renderRequestPanel();
  clearResponse();
}

function renderRequestPanel() {
  const ep = currentEndpoint;
  const panel = document.getElementById('requestPanel');

  // Build initial URL
  let urlPath = ep.path;
  const pathParams = ep.pathParams || [];
  const queryParams = ep.params || [];

  const paramInputsHTML = [
    ...(pathParams.length ? [`
      <div class="params-section">
        <div class="params-label">Path Params</div>
        <div class="params-grid">
          ${pathParams.map(p => `
            <div class="param-input-wrap">
              <label>:${p.key}</label>
              <input class="param-input path-param" data-key="${p.key}" type="text" value="${p.default}" placeholder="${p.label}" oninput="rebuildUrl()">
            </div>
          `).join('')}
        </div>
      </div>
    `] : []),
    ...(queryParams.length ? [`
      <div class="params-section">
        <div class="params-label">Query Params</div>
        <div class="params-grid">
          ${queryParams.map(p => `
            <div class="param-input-wrap">
              <label>${p.key}</label>
              <input class="param-input query-param" data-key="${p.key}" type="text" value="${p.default}" placeholder="${p.label}" oninput="rebuildUrl()">
            </div>
          `).join('')}
        </div>
      </div>
    `] : []),
  ].join('');

  panel.innerHTML = `
    <div class="endpoint-title">${ep.name}</div>
    <div class="endpoint-desc">${ep.desc} <span style="color:var(--muted)">— GET ${ep.path}</span></div>
    <div class="url-builder">
      <input class="full-url" id="fullUrl" type="text" value="" readonly>
      <button class="send-btn" id="sendBtn" onclick="sendRequest()">
        <span>▶ SEND</span>
      </button>
    </div>
    ${paramInputsHTML}
  `;

  rebuildUrl();
}

function rebuildUrl() {
  if (!currentEndpoint) return;
  const base = document.getElementById('baseUrl').value.replace(/\/$/, '');
  let path = currentEndpoint.path;

  // Replace path params
  document.querySelectorAll('.path-param').forEach(input => {
    const val = input.value.trim() || `:${input.dataset.key}`;
    path = path.replace(`:${input.dataset.key}`, encodeURIComponent(val));
  });

  // Build query string
  const qp = [];
  document.querySelectorAll('.query-param').forEach(input => {
    if (input.value.trim()) {
      qp.push(`${input.dataset.key}=${encodeURIComponent(input.value.trim())}`);
    }
  });

  const url = base + path + (qp.length ? '?' + qp.join('&') : '');
  const el = document.getElementById('fullUrl');
  if (el) el.value = url;
}

// ─── Send Request ─────────────────────────────────────────────────────────────
async function sendRequest() {
  const url = document.getElementById('fullUrl')?.value;
  if (!url) return;

  const btn = document.getElementById('sendBtn');
  btn.classList.add('loading');
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;margin:2px"></div>';

  document.getElementById('globalStatus').textContent = '...';
  document.getElementById('globalStatus').className = 'status-badge idle';

  // Show loading state
  const container = document.getElementById('responseContainer');
  container.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Fetching...</span></div>`;

  const historyBar = document.getElementById('historyBar');
  historyBar.style.display = 'flex';

  const startTime = Date.now();

  try {
    const res = await fetch(url);
    const elapsed = Date.now() - startTime;
    const text = await res.text();
    let json = null;
    try { json = JSON.parse(text); } catch (e) {}

    const size = new Blob([text]).size;
    const sizeStr = size > 1024 ? (size / 1024).toFixed(1) + ' KB' : size + ' B';

    // Status class
    const statusClass = res.status >= 500 ? 's5xx' : res.status >= 400 ? 's4xx' : 's2xx';
    const isOk = res.status < 400;

    // Add to history
    history.unshift({ url, status: res.status, ok: isOk, name: currentEndpoint.name });
    if (history.length > 8) history.pop();
    renderHistory();

    // Global badge
    document.getElementById('globalStatus').textContent = isOk ? `${res.status} OK` : `${res.status} ERR`;
    document.getElementById('globalStatus').className = `status-badge ${isOk ? 'ok' : 'err'}`;

    // Render response
    container.innerHTML = `
      <div class="response-header">
        <div class="response-meta">
          <span class="res-status ${statusClass}">${res.status} ${res.statusText || ''}</span>
          <span class="res-time">⏱ ${elapsed}ms</span>
          <span class="res-size">📦 ${sizeStr}</span>
        </div>
        <button class="copy-btn" onclick="copyResponse()">Copy JSON</button>
      </div>
      <div class="response-body" id="responseBody">
        ${json !== null ? renderJSON(json) : `<pre style="color:var(--text);white-space:pre-wrap;word-break:break-all;">${escapeHTML(text)}</pre>`}
      </div>
    `;
    window._lastResponseText = text;

  } catch (err) {
    const elapsed = Date.now() - startTime;
    document.getElementById('globalStatus').textContent = 'FAILED';
    document.getElementById('globalStatus').className = 'status-badge err';

    history.unshift({ url, status: 'ERR', ok: false, name: currentEndpoint.name });
    if (history.length > 8) history.pop();
    renderHistory();

    container.innerHTML = `
      <div class="response-header">
        <div class="response-meta">
          <span class="res-status s5xx">NETWORK ERROR</span>
          <span class="res-time">⏱ ${elapsed}ms</span>
        </div>
      </div>
      <div class="response-body">
        <div class="error-banner">
          ⚠ ${escapeHTML(err.message)}<br><br>
          <span style="color:var(--muted)">Make sure your Go server is running at: <strong>${document.getElementById('baseUrl').value}</strong></span><br>
          <span style="color:var(--muted)">Also ensure CORS is enabled (it is by default in the backend).</span>
        </div>
      </div>
    `;
  }

  btn.classList.remove('loading');
  btn.innerHTML = '<span>▶ SEND</span>';
}

// ─── Render JSON ──────────────────────────────────────────────────────────────
function renderJSON(obj, indent = 0) {
  const pad = '  '.repeat(indent);
  const padInner = '  '.repeat(indent + 1);

  if (obj === null) return `<span class="json-null">null</span>`;
  if (typeof obj === 'boolean') return `<span class="json-bool">${obj}</span>`;
  if (typeof obj === 'number') return `<span class="json-number">${obj}</span>`;
  if (typeof obj === 'string') return `<span class="json-string">"${escapeHTML(obj)}"</span>`;

  if (Array.isArray(obj)) {
    if (obj.length === 0) return `<span class="json-bracket">[]</span>`;
    const items = obj.map(v => `${padInner}${renderJSON(v, indent + 1)}`).join(',\n');
    return `<span class="json-bracket">[</span>\n${items}\n${pad}<span class="json-bracket">]</span>`;
  }

  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return `<span class="json-bracket">{}</span>`;
    const items = keys.map(k =>
      `${padInner}<span class="json-key">"${escapeHTML(k)}"</span><span class="json-bracket">: </span>${renderJSON(obj[k], indent + 1)}`
    ).join(',\n');
    return `<span class="json-bracket">{</span>\n${items}\n${pad}<span class="json-bracket">}</span>`;
  }

  return String(obj);
}

function escapeHTML(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function clearResponse() {
  document.getElementById('responseContainer').innerHTML = `
    <div class="empty-state" style="flex:1">
      <div class="icon">⚡</div>
      <p>Hit <strong style="color:var(--accent)">SEND</strong> to fire the request</p>
    </div>
  `;
  document.getElementById('globalStatus').textContent = 'IDLE';
  document.getElementById('globalStatus').className = 'status-badge idle';
}

function copyResponse() {
  if (window._lastResponseText) {
    navigator.clipboard.writeText(window._lastResponseText).then(() => showToast('Copied!'));
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function renderHistory() {
  const bar = document.getElementById('historyBar');
  bar.innerHTML = history.map((h, i) => `
    <div class="history-chip" title="${h.url}">
      <div class="chip-status ${h.ok ? 'ok' : 'err'}"></div>
      ${escapeHTML(h.name)} <span style="color:var(--muted)">${h.status}</span>
    </div>
  `).join('');
}

// ─── Listen for base URL changes ──────────────────────────────────────────────
document.getElementById('baseUrl').addEventListener('input', () => rebuildUrl());

// ─── Init ─────────────────────────────────────────────────────────────────────
renderSidebar();

// Auto-select first endpoint
setTimeout(() => selectEndpoint('Health & Stats', 0), 100);
</script>
